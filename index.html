<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment:   #F6F0E4;
      --parchment-2: #EDE4D0;
      --ink:         #231508;
      --ink-soft:    #5C4033;
      --rust:        #B84A24;
      --rust-light:  #D9714E;
      --gold:        #C09B5B;
      --card-bg:     #FDFAF3;
      --border:      #D9CFBA;

      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Lora', Georgia, serif;
      --font-ui:      'Instrument Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--parchment);
      color: var(--ink);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
      z-index: 9999;
    }

    /* ═══════════════════════════
       BOTTOM NAV
    ═══════════════════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--parchment);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: 56px;
    }

    .bottom-nav a,
    .bottom-nav button {
      font-family: var(--font-ui);
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink-soft);
      background: none;
      border: none;
      cursor: pointer;
      padding: .5rem 1.5rem;
      transition: color .2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
    }

    .bottom-nav a:hover,
    .bottom-nav button:hover { color: var(--rust); }

    .bottom-nav svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* pad content so last cards clear the nav */
    main, footer { padding-bottom: 72px; }

    /* ═══════════════════════════
       HERO
    ═══════════════════════════ */
    .hero {
      position: relative;
      display: grid;
      place-items: center;
      text-align: center;
      padding: clamp(5rem, 12vw, 9rem) clamp(1.5rem, 8vw, 6rem) clamp(4rem, 10vw, 7rem);
      overflow: hidden;
    }

    /* decorative ruled lines */
    .hero::before,
    .hero::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, 90vw);
      height: 1px;
      background: var(--gold);
      opacity: .5;
    }
    .hero::before { top: clamp(3.5rem, 8vw, 6rem); }
    .hero::after  { bottom: clamp(2.5rem, 6vw, 5rem); }

    .hero-eyebrow {
      font-family: var(--font-ui);
      font-size: .72rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 10vw, 8.5rem);
      font-weight: 300;
      line-height: .95;
      color: var(--ink);
      letter-spacing: -.01em;
    }

    .hero-title em {
      font-style: italic;
      color: var(--rust);
      display: block;
    }

    .hero-subtitle {
      margin-top: 1.75rem;
      font-family: var(--font-body);
      font-style: italic;
      font-size: clamp(.95rem, 2vw, 1.15rem);
      color: var(--ink-soft);
      max-width: 36ch;
      line-height: 1.6;
    }

    .hero-ornament {
      margin: 1.75rem auto 0;
      width: 60px;
      height: 1px;
      background: var(--rust);
      opacity: .4;
      position: relative;
    }
    .hero-ornament::before,
    .hero-ornament::after {
      content: '◆';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: .4rem;
      color: var(--rust);
      opacity: .8;
    }
    .hero-ornament::before { left: -1rem; }
    .hero-ornament::after  { right: -1rem; }

    /* ═══════════════════════════
       CATEGORY FILTER BAR
    ═══════════════════════════ */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: .5rem;
      flex-wrap: wrap;
      padding: 0 1.5rem 3.5rem;
    }

    .filter-btn {
      font-family: var(--font-ui);
      font-size: .73rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-soft);
      padding: .45rem 1.1rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--rust);
      border-color: var(--rust);
      color: #fff;
    }

    /* ═══════════════════════════
       SECTION / GRID
    ═══════════════════════════ */
    .menu-section {
      padding: 0 clamp(1.5rem, 5vw, 4rem) 5rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      font-weight: 400;
      font-style: italic;
      color: var(--ink);
      white-space: nowrap;
    }

    .section-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: 1.5rem;
    }

    /* ═══════════════════════════
       CARD
    ═══════════════════════════ */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .25s ease, box-shadow .25s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(35,21,8,.1);
    }

    /* Photo area — warm tinted placeholders */
    .card-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder pattern when no image */
    .card-photo.placeholder {
      background-color: var(--parchment-2);
    }
    .card-photo.placeholder::after {
      content: attr(data-label);
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-style: italic;
      color: var(--border);
    }

    .card-category-badge {
      position: absolute;
      top: .75rem;
      left: .75rem;
      font-family: var(--font-ui);
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      background: var(--rust);
      color: #fff;
      padding: .25rem .6rem;
      border-radius: 2px;
    }

    .card-body {
      padding: 1.25rem 1.4rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .card-name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.15;
      color: var(--ink);
    }

    .card-desc {
      font-family: var(--font-body);
      font-size: .88rem;
      line-height: 1.65;
      color: var(--ink-soft);
      font-style: italic;
    }

    /* ═══════════════════════════
       FOOTER
    ═══════════════════════════ */
    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2.5rem 1.5rem;
    }

    footer p {
      font-family: var(--font-ui);
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ═══════════════════════════
       ANIMATION
    ═══════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow  { animation: fadeUp .6s ease both; }
    .hero-title    { animation: fadeUp .6s .1s ease both; }
    .hero-subtitle { animation: fadeUp .6s .2s ease both; }
    .hero-ornament { animation: fadeUp .6s .3s ease both; }
    .filter-bar    { animation: fadeUp .6s .35s ease both; }

    .card {
      opacity: 0;
      animation: fadeUp .5s ease forwards;
    }

    /* ═══════════════════════════
       RESPONSIVE
    ═══════════════════════════ */
    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      // ── Sides ──
      { category: 'sides', name: 'Garlic Roasted Potatoes', image: null,
        desc: 'Crispy, golden potatoes roasted with olive oil and plenty of garlic. A go-to alongside almost anything.' },
      { category: 'sides', name: 'Potato Salad', image: null,
        desc: 'Creamy homemade potato salad. Classic, simple, and always the first thing to disappear.' },
      { category: 'sides', name: 'Caesar Salad', image: null,
        desc: 'Crisp romaine, shaved parmesan, and a bold, garlicky caesar dressing. No croutons for Papa.' },
      { category: 'sides', name: 'Cornbread', image: null,
        desc: 'Golden, slightly sweet skillet cornbread. Essential alongside a bowl of chili or soup.' },
      { category: 'sides', name: 'Coleslaw', image: null,
        desc: 'Creamy, tangy coleslaw with a light hand on the dressing. The cool contrast to crispy fried things.' },
    ];

    // ── Render ─────────────────────────────────────────────────────────────────
    const root = document.getElementById('menu-root');

    const categories = [...new Set(dishes.map(d => d.category))];

    categories.forEach(cat => {
      const section = document.createElement('section');
      section.className = 'menu-section';
      section.id = cat;
      section.dataset.category = cat;

      const label = cat.charAt(0).toUpperCase() + cat.slice(1);
      section.innerHTML = `
        <div class="section-header">
          <h2 class="section-title">${label}</h2>
          <div class="section-rule"></div>
        </div>
        <div class="menu-grid"></div>`;

      const grid = section.querySelector('.menu-grid');

      dishes.filter(d => d.category === cat).forEach(dish => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.category = cat;

        const photoContent = dish.image
          ? `<img src="${dish.image}" alt="${dish.name}" loading="lazy">`
          : '';

        card.innerHTML = `
          <div class="card-photo${dish.image ? '' : ' placeholder'}" data-label="◉">
            ${photoContent}
          </div>
          <div class="card-body">
            <h3 class="card-name">${dish.name}</h3>
            <p class="card-desc">${dish.desc}</p>
          </div>`;

        grid.appendChild(card);
      });

      root.appendChild(section);
    });

    // ── Staggered reveal ───────────────────────────────────────────────────────
    document.querySelectorAll('.card').forEach((card, i) => {
      card.style.animationDelay = `${0.4 + i * 0.04}s`;
    });

    // ── Category filter ────────────────────────────────────────────────────────
    const filterBtns = document.querySelectorAll('.filter-btn');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;

        document.querySelectorAll('.menu-section').forEach(sec => {
          sec.style.display = (filter === 'all' || sec.dataset.category === filter) ? '' : 'none';
        });
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Hero ── -->
  <section class="hero">
    <p class="hero-eyebrow">Made with love, eaten together</p>
    <h1 class="hero-title">
      What's<br>
      <em>for dinner?</em>
    </h1>
    <p class="hero-subtitle">One meal a day, made well — a collection of the dishes we come home to.</p>
    <div class="hero-ornament"></div>
  </section>

  <!-- ── Filter bar ── -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="mains">Mains</button>
    <button class="filter-btn" data-filter="sides">Sides</button>
  </div>

  <!-- ── Menu Sections (rendered by JS) ── -->
  <main id="menu-root">

  </main>

  <!-- ── Recipe Detail View (rendered by JS) ── -->
  <div id="recipe-view" hidden></div>

  <!-- ── Scroll to top ── -->
  <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <!-- ── Footer ── -->
  <footer>
    <p>Home Menu &mdash; Made at home, always</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
